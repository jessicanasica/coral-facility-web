<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level Access Request Result - ARC App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a3d4a 0%, #1a6b7c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 3rem;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .icon.success {
      background: #10b981;
      color: white;
    }

    .icon.error {
      background: #ef4444;
      color: white;
    }

    .icon.pending {
      background: #f59e0b;
      color: white;
    }

    h1 {
      color: #0a3d4a;
      margin-bottom: 1rem;
      font-size: 1.875rem;
      font-weight: 700;
    }

    .message {
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.6;
      font-size: 1rem;
    }

    .details {
      background: #f8fafc;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
    }

    .detail-row:last-child {
      margin-bottom: 0;
    }

    .detail-label {
      color: #64748b;
      font-weight: 500;
    }

    .detail-value {
      color: #0a3d4a;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #0a3d4a;
      color: white;
    }

    .btn-primary:hover {
      background: #083040;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0a3d4a;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
      color: #94a3b8;
      font-size: 0.75rem;
    }

    .error-details {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1rem;
      color: #dc2626;
      font-size: 0.875rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="icon" class="icon">
      <span id="icon-symbol">?</span>
    </div>

    <h1 id="title">Processing Request...</h1>
    
    <div id="message" class="message">
      Please wait while we process your request.
    </div>

    <div id="details" class="details" style="display: none;">
      <div class="detail-row">
        <span class="detail-label">Request ID:</span>
        <span id="request-id" class="detail-value">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Email:</span>
        <span id="email" class="detail-value">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Level:</span>
        <span id="level" class="detail-value">-</span>
      </div>
    </div>

    <div id="error-details" class="error-details" style="display: none;">
      <strong>Error Details:</strong>
      <div id="error-message">-</div>
    </div>

    <div class="footer">
      <p>&copy; 2026 ARC App. All rights reserved.</p>
    </div>
  </div>

  <script>
    // Parse URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status') || 'error';
    const requestId = urlParams.get('id') || '-';
    const email = urlParams.get('email') || '-';
    const level = urlParams.get('level') || '-';
    const error = urlParams.get('error') || '';
    const firstName = urlParams.get('firstName') || '';
    const lastName = urlParams.get('lastName') || '';
    const fullName = firstName && lastName ? `${firstName} ${lastName}` : email;

    // Update page based on status
    const icon = document.getElementById('icon');
    const iconSymbol = document.getElementById('icon-symbol');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const details = document.getElementById('details');
    const errorDetails = document.getElementById('error-details');

    // Set details
    switch (status) {
      case 'approved':
        icon.className = 'icon success';
        iconSymbol.textContent = '✓';
        title.textContent = 'Access Request Approved';
        message.textContent = fullName && level 
          ? `You have approved the access request for ${fullName} to ${level}.`
          : 'The access request has been approved.';
        
        if (fullName || level || requestId) {
          details.style.display = 'block';
          let detailsHTML = '';
          if (fullName) detailsHTML += `<div class="detail-row"><span class="detail-label">User:</span><span class="detail-value">${fullName}</span></div>`;
          if (level) detailsHTML += `<div class="detail-row"><span class="detail-label">Requested Level:</span><span class="detail-value">${level}</span></div>`;
          if (requestId) detailsHTML += `<div class="detail-row"><span class="detail-label">Request ID:</span><span class="detail-value">${requestId}</span></div>`;
          detailsHTML += `<div class="detail-row" style="border-bottom: none; padding-top: 1rem; display: block;"><span style="color: #059669; font-weight: 600;">The user has been notified and their access level has been updated.</span></div>`;
          details.innerHTML = detailsHTML;
        }
        break;

      case 'rejected':
        icon.className = 'icon error';
        iconSymbol.textContent = '✕';
        title.textContent = 'Access Request Rejected';
        message.textContent = fullName && level
          ? `You have rejected the access request for ${fullName} to ${level}.`
          : 'The access request has been rejected.';
        
        if (fullName || level || requestId) {
          details.style.display = 'block';
          let detailsHTML = '';
          if (fullName) detailsHTML += `<div class="detail-row"><span class="detail-label">User:</span><span class="detail-value">${fullName}</span></div>`;
          if (level) detailsHTML += `<div class="detail-row"><span class="detail-label">Requested Level:</span><span class="detail-value">${level}</span></div>`;
          if (requestId) detailsHTML += `<div class="detail-row"><span class="detail-label">Request ID:</span><span class="detail-value">${requestId}</span></div>`;
          detailsHTML += `<div class="detail-row" style="border-bottom: none; padding-top: 1rem; display: block;"><span style="color: #dc2626; font-weight: 600;">The user has been notified.</span></div>`;
          details.innerHTML = detailsHTML;
        }
        break;

      case 'pending':
        icon.className = 'icon pending';
        iconSymbol.textContent = '⏳';
        title.textContent = 'Request Pending';
        message.textContent = 'This access request is still pending approval.';
        break;

      case 'error':
      default:
        icon.className = 'icon error';
        iconSymbol.textContent = '!';
        title.textContent = 'Error';
        message.textContent = error || 'An error occurred while processing the request.';
        if (error) {
          errorDetails.style.display = 'block';
          document.getElementById('error-message').textContent = decodeURIComponent(error);
        }
        break;
    }

    // Log for debugging
    console.log('Access Request Result:', {
      status,
      requestId,
      email,
      level,
      error,
      userAgent: navigator.userAgent,
      timestamp: new Date().toISOString()
    });
  </script>
</body>
</html>
