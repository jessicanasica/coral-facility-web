<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Completed - Coral Facility App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a3d4a 0%, #1a6b7c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 3rem;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .icon.success {
      background: #10b981;
      color: white;
    }

    .icon.error {
      background: #ef4444;
      color: white;
    }

    .icon.pending {
      background: #f59e0b;
      color: white;
    }

    h1 {
      color: #0a3d4a;
      font-size: 1.75rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .message {
      color: #4b5563;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .details {
      background: #f3f4f6;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: left;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 600;
      color: #6b7280;
    }

    .detail-value {
      color: #111827;
    }

    .error-details {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1rem;
      color: #991b1b;
      font-size: 0.875rem;
    }

    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 0.875rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0a3d4a;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="icon" class="icon"></div>
    <h1 id="title">Processing...</h1>
    <p id="message" class="message"></p>
    <div id="details" class="details" style="display: none;"></div>
    <div id="error-details" class="error-details" style="display: none;"></div>
    <div class="footer">
      <div class="logo">Coral Facility App</div>
      <div>Admin Access Management</div>
    </div>
  </div>

  <script>
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        status: params.get('status'),
        email: params.get('email'),
        level: params.get('level'),
        id: params.get('id'),
        error: params.get('error')
      };
    }

    function displayResult() {
      const { status, email, level, id, error } = getQueryParams();
      const iconEl = document.getElementById('icon');
      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');
      const detailsEl = document.getElementById('details');
      const errorDetailsEl = document.getElementById('error-details');

      if (status === 'approved') {
        iconEl.className = 'icon success';
        iconEl.textContent = '✓';
        titleEl.textContent = 'Request Approved';
        messageEl.textContent = `You have successfully approved the level access request. The user has been notified via email and their account has been updated.`;
        
        if (email || level || id) {
          detailsEl.style.display = 'block';
          let detailsHTML = '';
          if (id) detailsHTML += `<div class="detail-row"><span class="detail-label">Request ID:</span><span class="detail-value">${id}</span></div>`;
          if (email) detailsHTML += `<div class="detail-row"><span class="detail-label">User Email:</span><span class="detail-value">${email}</span></div>`;
          if (level) detailsHTML += `<div class="detail-row"><span class="detail-label">Access Level:</span><span class="detail-value">${level}</span></div>`;
          detailsEl.innerHTML = detailsHTML;
        }
      } else if (status === 'rejected') {
        iconEl.className = 'icon error';
        iconEl.textContent = '✕';
        titleEl.textContent = 'Request Rejected';
        messageEl.textContent = `You have rejected the level access request. The user has been notified via email.`;
        
        if (email || level || id) {
          detailsEl.style.display = 'block';
          let detailsHTML = '';
          if (id) detailsHTML += `<div class="detail-row"><span class="detail-label">Request ID:</span><span class="detail-value">${id}</span></div>`;
          if (email) detailsHTML += `<div class="detail-row"><span class="detail-label">User Email:</span><span class="detail-value">${email}</span></div>`;
          if (level) detailsHTML += `<div class="detail-row"><span class="detail-label">Requested Level:</span><span class="detail-value">${level}</span></div>`;
          detailsEl.innerHTML = detailsHTML;
        }
      } else if (status === 'pending') {
        iconEl.className = 'icon pending';
        iconEl.textContent = '⏳';
        titleEl.textContent = 'Request Pending';
        messageEl.textContent = 'This request is still pending approval.';
      } else {
        iconEl.className = 'icon error';
        iconEl.textContent = '!';
        titleEl.textContent = 'Action Failed';
        messageEl.textContent = 'There was an error processing your request.';
        
        if (error) {
          errorDetailsEl.style.display = 'block';
          errorDetailsEl.textContent = `Error: ${error}`;
        }
      }
    }

    displayResult();
  </script>
</body>
</html>
